name: Security Gate

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks_pr:
    name: Secrets Scan (gitleaks) - working tree only
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run gitleaks (no git history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false

  gitleaks_history:
    name: Secrets Scan (gitleaks) - full history (scheduled)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks (history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false

  dependency-review:
    name: Dependency Review (PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  python-audit:
    name: Python audit (pip-audit) if requirements exist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        if: hashFiles('requirements.txt', 'requirements.in', 'pyproject.toml') != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        if: hashFiles('requirements.txt', 'requirements.in', 'pyproject.toml') != ''
        run: python -m pip install --upgrade pip pip-audit
      - name: Run pip-audit (high severity)
        if: hashFiles('requirements.txt', 'requirements.in', 'pyproject.toml') != ''
        run: |
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt --severity high; fi
          if [ -f requirements.in ]; then pip-audit -r requirements.in --severity high; fi

  node-audit:
    name: Node audit (npm) if package-lock exists
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        if: hashFiles('package-lock.json', 'package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm audit (high)
        if: hashFiles('package-lock.json', 'package.json') != ''
        run: |
          npm ci
          npm audit --audit-level=high
