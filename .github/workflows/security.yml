name: Security Gate

on:
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security Gate (single-runner)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secrets Scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        continue-on-error: true

      - name: Set up Python
        if: hashFiles('requirements.txt', 'requirements.in', 'pyproject.toml') != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        if: hashFiles('requirements.txt', 'requirements.in', 'pyproject.toml') != ''
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit (high severity)
        if: hashFiles('requirements.txt', 'requirements.in', 'pyproject.toml') != ''
        run: |
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt --severity high; fi
          if [ -f requirements.in ]; then pip-audit -r requirements.in --severity high; fi

      - name: Set up Node
        if: hashFiles('package-lock.json', 'package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm audit (high)
        if: hashFiles('package-lock.json', 'package.json') != ''
        run: |
          npm ci
          npm audit --audit-level=high
