title = "FinalBossTech gitleaks baseline"

[allowlist]
description = "Allowlisted patterns (examples + tests only)"
regexes = [
  "your_.*_here",
  "changeme",
  "example",
  "dummy",
  "not_production",
  "test_secret",
  "x\*40",
  "y\*40"
]
paths = [
  ".*\\.md$",
  ".*\\.txt$",
  ".*examples/.*",
  ".*test.*",
  ".*tests/.*"
]

[extend]
