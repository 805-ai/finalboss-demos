name: Security Gate

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config: .gitleaks.toml

  dependency-review:
    name: Dependency Review (PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  python-audit:
    name: Python audit (pip-audit) if requirements exist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        if: ${{ hashFiles('requirements.txt', 'requirements.in', 'pyproject.toml') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        if: ${{ hashFiles('requirements.txt', 'requirements.in', 'pyproject.toml') != '' }}
        run: python -m pip install --upgrade pip pip-audit
      - name: Run pip-audit
        if: ${{ hashFiles('requirements.txt', 'requirements.in', 'pyproject.toml') != '' }}
        run: |
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt; fi
          if [ -f requirements.in ]; then pip-audit -r requirements.in; fi

  node-audit:
    name: Node audit (npm) if package-lock exists
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        if: ${{ hashFiles('package-lock.json', 'package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm audit
        if: ${{ hashFiles('package-lock.json', 'package.json') != '' }}
        run: |
          npm ci
          npm audit --audit-level=high
